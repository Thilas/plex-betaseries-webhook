name: Build

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master]
  release:
    types: [published]

env:
  NODE_VERSION: 24.x # Should match version in Dockerfile
  SONAR_DIRECTORY: /github/workspace
  IMAGE_NAME: plex-betaseries-webhook

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ github.event_name != 'pull_request' && format('{0}/{1}', vars.DH_USER, env.IMAGE_NAME) || '' }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Bump version
        if: github.event_name != 'pull_request'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: npm --no-git-tag-version version "$VERSION"

      - name: Create SonarCloud scanner default working directory
        run: |
          sudo mkdir --parents "$SONAR_DIRECTORY"
          sudo mount --bind "$GITHUB_WORKSPACE" "$SONAR_DIRECTORY"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci

      - run: npm run build

      - run: npm test
        working-directory: ${{ env.SONAR_DIRECTORY }} # Align on SonarCloud scanner default working directory

      - name: SonarCloud scan
        continue-on-error: ${{ github.event_name == 'pull_request' }} # because scanning from forks is not supported for now
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          args: -Dsonar.projectVersion=${{ steps.meta.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        if: github.event_name == 'release' || github.actor == github.repository_owner
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DH_USER }}
          password: ${{ secrets.DH_PAT }}

      - name: Build and push docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name == 'release' || github.actor == github.repository_owner }}
